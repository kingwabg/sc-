<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Naver SmartEditor 2 — Office wrapper</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; height: 100%; }
  /* Hide the demo buttons, keep the form (and its editor iframes) visible */
  form > p { display: none !important; }
  #ir1 { display: none !important; }
</style>
<script src="./js/HuskyEZCreator.js" charset="utf-8"></script>
</head>
<body>

<form>
  <textarea name="ir1" id="ir1" rows="10" cols="100" style="width:100%; height:100%; min-width:0; display:none;"></textarea>
</form>

<script>
(function () {
  var oEditors = [];
  var initialized = false;
  var pendingHTML = null;

  function notify(type, payload) {
    try {
      window.parent.postMessage({ source: 'se2', type: type, payload: payload }, '*');
    } catch (e) { /* noop */ }
  }

  window.oEditorAPI = {
    setHTML: function (html) {
      if (!initialized) { pendingHTML = html || ''; return; }
      try {
        oEditors.getById['ir1'].exec('PASTE_HTML', [html || '']);
        // PASTE_HTML does not fire keyup, so manually emit change to trigger parent autosave
        try {
          var updated = oEditors.getById['ir1'].getIR();
          notify('change', { html: updated });
        } catch (e) {}
      } catch (e) {}
    },
    getHTML: function () {
      if (!initialized) return '';
      try { return oEditors.getById['ir1'].getIR(); } catch (e) { return ''; }
    },
    isReady: function () { return initialized; },
  };

  nhn.husky.EZCreator.createInIFrame({
    oAppRef: oEditors,
    elPlaceHolder: 'ir1',
    sSkinURI: 'SmartEditor2Skin.html',
    htParams: {
      bUseToolbar: true,
      bUseVerticalResizer: true,
      bUseModeChanger: true,
    },
    fOnAppLoad: function () {
      initialized = true;
      if (pendingHTML != null) {
        try { oEditors.getById['ir1'].exec('PASTE_HTML', [pendingHTML]); } catch (e) {}
        pendingHTML = null;
      }
      notify('ready');
    },
    fCreator: 'createSEditor2',
  });

  var debounceTimer = null;
  document.addEventListener('keyup', function () {
    if (!initialized) return;
    if (debounceTimer) clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      try {
        var html = oEditors.getById['ir1'].getIR();
        notify('change', { html: html });
      } catch (e) {}
    }, 300);
  });
})();
</script>

</body>
</html>
